<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JRF — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text&family=Lexend:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
<style>
  html, body { height: 100%; }
  body { overflow-x: hidden; }
  .proto-stage {
    min-height: calc(100vh - 41px);
  }
  /* Subtle parallax — split-hero media + climate page bottom related media */
  .hero__split-media img,
  .related__media img {
    transform: scale(1.18) translate3d(0, var(--parallax-y, 0px), 0);
    transform-origin: center center;
    will-change: transform;
  }
  @media (prefers-reduced-motion: reduce) {
    .hero__split-media img,
    .related__media img {
      transform: none;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/Chrome.jsx"></script>
<script type="text/babel" src="src/HomePage.jsx"></script>
<script type="text/babel" src="src/NarrativePage.jsx"></script>
<script type="text/babel" src="src/ClimatePage.jsx"></script>
<script type="text/babel" src="src/StylesPage.jsx"></script>
<script type="text/babel" src="src/App.jsx"></script>
<script>
  // Subtle parallax — translate Y based on element's position in viewport
  (function () {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var SELECTOR = '.hero__split-media img, .related__media img';
    var SCALE = 1.18;
    var MAX_STRENGTH = 60; // px; total travel ~120px across viewport
    var rafId = null;
    function update() {
      rafId = null;
      var imgs = document.querySelectorAll(SELECTOR);
      var vh = window.innerHeight || document.documentElement.clientHeight;
      imgs.forEach(function (img) {
        var parent = img.parentElement;
        if (!parent) return;
        var rect = parent.getBoundingClientRect();
        if (rect.bottom < 0 || rect.top > vh) return; // offscreen
        // Clamp strength so we never translate past the scale buffer (~9% of height each side, minus a 4px safety margin)
        var buffer = Math.max(0, rect.height * (SCALE - 1) / 2 - 4);
        var strength = Math.min(MAX_STRENGTH, buffer);
        var center = rect.top + rect.height / 2;
        var progress = (center - vh / 2) / (vh / 2 + rect.height / 2);
        progress = Math.max(-1, Math.min(1, progress));
        var y = -progress * strength;
        img.style.setProperty('--parallax-y', y.toFixed(2) + 'px');
      });
    }
    function onScroll() {
      if (rafId == null) rafId = requestAnimationFrame(update);
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    // Re-run once React has rendered
    var tries = 0;
    function poll() {
      update();
      if (tries++ < 20) setTimeout(poll, 200);
    }
    poll();
  })();
</script>
</body>
</html>
